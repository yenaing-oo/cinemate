services:
    app:
        platform: "linux/amd64"
        build:
            context: .
            dockerfile: Dockerfile
            args:
                NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
                NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
                NEXT_PUBLIC_CINEMA_TIMEZONE: ${NEXT_PUBLIC_CINEMA_TIMEZONE}
                NEXT_PUBLIC_BOOKING_CANCEL_WINDOW_MINUTES: ${NEXT_PUBLIC_BOOKING_CANCEL_WINDOW_MINUTES}
        working_dir: /app
        ports:
            - "3000:3000"
        image: cinemate
        env_file:
            - .env

    k6:
        image: grafana/k6:latest
        working_dir: /work
        volumes:
            - .:/work
        extra_hosts:
            - "host.docker.internal:host-gateway"
        env_file:
            - load-tests/.env
        command: run load-tests/suites/movie-showtime.js

    k6-dashboard:
        image: grafana/k6:latest
        working_dir: /work
        volumes:
            - .:/work
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "5665:5665"
        env_file:
            - load-tests/.env
        environment:
            - K6_WEB_DASHBOARD=true
            - K6_WEB_DASHBOARD_HOST=0.0.0.0
            - K6_WEB_DASHBOARD_PORT=5665
            - K6_WEB_DASHBOARD_EXPORT=/work/load-tests/results/dashboard-report.html
        command: run load-tests/suites/movie-showtime.js

    k6-booking:
