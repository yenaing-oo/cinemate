name: PR Check

on:
    pull_request:
        branches: [main]

concurrency:
    group: pr-check-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: 20
    SKIP_ENV_VALIDATION: true
    DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
    DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

jobs:
    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm prisma generate
            - run: pnpm typecheck

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm lint

    format:
        name: Format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm format:check

    prisma:
        name: Prisma Schema & Migrations
        runs-on: ubuntu-latest
        needs: [typecheck, lint]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - uses: supabase/setup-cli@v1
            - run: pnpm install --frozen-lockfile
            - run: supabase db start
            - run: pnpm prisma validate
            - run: pnpm prisma migrate deploy

    test-frontend:
        name: Test Frontend
        runs-on: ubuntu-latest
        needs: [typecheck, lint]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm test:frontend -- --run

    test-backend:
        name: Test Backend
        runs-on: ubuntu-latest
        needs: [typecheck, lint]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm test:backend -- --run

    test-integration:
        name: Test Integration
        runs-on: ubuntu-latest
        needs: [typecheck, lint]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - uses: supabase/setup-cli@v1
            - run: pnpm install --frozen-lockfile
            - run: supabase db start
            - name: Create test env file
              run: |
                  cat <<'EOF' > .env.test
                  DATABASE_URL=${{ env.DATABASE_URL }}
                  DIRECT_URL=${{ env.DIRECT_URL }}
                  SKIP_ENV_VALIDATION=true
                  EOF
            - run: pnpm db:test:prepare
            - run: pnpm test:integration -- --run

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [typecheck, lint, prisma, test-frontend, test-backend, test-integration]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
